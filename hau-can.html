<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hậu cần — BCH ĐA CAM LÂM - CAM RANH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#f0f3f7; --border:#d7dee6; --text:#1a2433; --muted:#5b6b7d;
    --accent:#1565c0; --accent-dark:#0d47a1; --ok:#2e7d32; --ok-dim:#e8f5e9; --bad:#c62828; --bad-dim:#fdecea;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px;}
  .topbar{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .brand{font-size:15px;color:var(--accent-dark);font-weight:800;}
  a.back{color:var(--muted);font-size:13px;text-decoration:none;border:1px solid var(--border);padding:8px 16px;border-radius:8px;background:#fff;}
  .card{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:26px 24px;box-shadow:0 4px 20px rgba(20,40,70,.08);margin-bottom:18px;}
  h2{font-size:19px;margin:0 0 4px;font-weight:800;color:var(--accent-dark);}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px;line-height:1.5;}
  .group-label{font-size:16px;color:var(--text);font-weight:700;margin:16px 0 10px;}
  .chip-list{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{position:relative;}
  .chip input{position:absolute;opacity:0;inset:0;cursor:pointer;margin:0;}
  .chip span{display:inline-block;padding:11px 18px;border-radius:20px;border:2px solid var(--border);
    background:var(--panel2);font-size:14px;font-weight:600;cursor:pointer;user-select:none;transition:.15s;color:var(--text);}
  .chip input:checked + span{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn{width:100%;padding:15px;border-radius:10px;border:none;background:var(--accent);color:#fff;
    font-weight:800;font-size:16px;cursor:pointer;font-family:inherit;margin-top:20px;}
  .btn:hover{filter:brightness(1.08);}
  .btn.secondary{background:#fff;color:var(--accent-dark);border:2px solid var(--accent);}
  .msg{padding:13px 16px;border-radius:10px;font-size:14px;margin-top:14px;display:none;font-weight:600;}
  .msg.show{display:block;}
  .msg.ok{background:var(--ok-dim);color:var(--ok);border:1px solid var(--ok);}
  .msg.bad{background:var(--bad-dim);color:var(--bad);border:1px solid var(--bad);}
  .loading{color:var(--muted);text-align:center;padding:30px;font-size:15px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">BCH ĐA CAM LÂM — CAM RANH</div>
  <a class="back" href="index.html">‹ Về trang báo cáo</a>
</div>

<div id="loadingBox" class="loading">Đang tải...</div>

<div id="appBox" style="display:none; width:100%; max-width:520px;">

  <div class="card">
    <h2>Thông tin vị trí &amp; nơi ở</h2>
    <p class="sub">Cập nhật khi có thay đổi. Hệ thống chỉ giữ lại lần cập nhật gần nhất.</p>

    <div class="group-label">Chọn vị trí làm việc:</div>
    <div class="chip-list" id="chipViTri"></div>

    <div class="group-label">Chọn vị trí ở:</div>
    <div class="chip-list" id="chipNoiO"></div>

    <div class="group-label">Face ID ra vào cổng:</div>
    <div class="chip-list" id="chipFaceId"></div>

    <button class="btn" id="btnLuuHoSo">Lưu thông tin</button>
    <div class="msg" id="msgHoSo"></div>
  </div>

  <div class="card">
    <h2>Xuất báo cáo</h2>
    <p class="sub">Xuất danh sách vị trí &amp; nơi ở của toàn bộ nhân viên ra file Excel.</p>
    <button class="btn secondary" id="btnXuatExcel">📄 Xuất Excel</button>
    <div class="msg" id="msgXuat"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://jqwjzvucwvlwbcgxhath.supabase.co";
const SUPABASE_KEY = "sb_publishable_hI0g6zHtG2aWOkmMCm8d5g_t1wspsgv";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const LS_KEY = "bch_nv_login";
const LOGIN_PAGE = "quan-ly-tai-khoan.html";

let saved = null;
let tuyChon = { vi_tri: [], noi_o: [], face_id: [] };

function showMsg(el, type, text){ el.className = "msg show " + type; el.textContent = text; }

function renderChips(containerId, name, options){
  const el = document.getElementById(containerId);
  el.innerHTML = options.map(o => `
    <label class="chip">
      <input type="radio" name="${name}" value="${o.gia_tri}">
      <span>${o.gia_tri}</span>
    </label>`).join("");
}

function getChecked(name){
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? [el.value] : [];
}
function setChecked(name, values){
  document.querySelectorAll(`input[name="${name}"]`).forEach(i => {
    i.checked = (values || []).includes(i.value);
  });
}

async function init(){
  const raw = localStorage.getItem(LS_KEY);
  if(!raw){ location.href = LOGIN_PAGE; return; }
  try{ saved = JSON.parse(raw); } catch(e){ location.href = LOGIN_PAGE; return; }

  const { data: res } = await sb.rpc("tra_cuu", { p_ten: saved.ten, p_msnv: saved.msnv });
  if(!res || res.status !== "da_duyet"){ location.href = LOGIN_PAGE; return; }
  if(!res.data.quyen || !res.data.quyen.hau_can){
    document.getElementById("loadingBox").textContent = "Bạn chưa được cấp quyền truy cập mục Hậu cần. Vui lòng liên hệ Ban chỉ huy.";
    return;
  }
  saved.ten = res.data.ten; saved.msnv = res.data.msnv;

  const { data: tc } = await sb.rpc("hc_lay_tuy_chon");
  (tc || []).forEach(t => { if(tuyChon[t.nhom]) tuyChon[t.nhom].push(t); });

  renderChips("chipViTri", "vi_tri", tuyChon.vi_tri);
  renderChips("chipNoiO", "noi_o", tuyChon.noi_o);
  renderChips("chipFaceId", "face_id", tuyChon.face_id);

  const { data: hoSo } = await sb.rpc("hc_lay_ho_so_ca_nhan", { p_msnv: saved.msnv });
  if(hoSo){
    setChecked("vi_tri", hoSo.vi_tri);
    setChecked("noi_o", hoSo.noi_o);
    setChecked("face_id", [hoSo.face_id]);
  }

  document.getElementById("loadingBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  // Bảng tin nội bộ
  try{
    const { data: tb } = await sb.rpc("lay_thong_bao_moi_nhat");
    if(tb){
      const seenKey = "bch_tb_seen_" + tb.id;
      if(!localStorage.getItem(seenKey)){
        const banner = document.createElement("div");
        banner.style.cssText = "position:fixed;top:0;left:0;right:0;background:#1565c0;color:#fff;padding:12px 16px;font-size:13px;font-weight:600;z-index:9998;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.2);";
        banner.innerHTML = '<span>📢 ' + tb.noi_dung + '</span><span style="cursor:pointer;font-weight:800;padding:0 6px;" id="bchTbClose">✕</span>';
        document.body.appendChild(banner);
        document.getElementById("bchTbClose").addEventListener("click", ()=>{
          localStorage.setItem(seenKey, "1");
          banner.remove();
        });
      }
    }
  }catch(e){}
}

document.getElementById("btnLuuHoSo").addEventListener("click", async ()=>{
  const viTri = getChecked("vi_tri");
  const noiO = getChecked("noi_o");
  const faceId = getChecked("face_id")[0] || "";
  if(viTri.length === 0 || noiO.length === 0 || !faceId){
    showMsg(document.getElementById("msgHoSo"), "bad", "Vui lòng chọn đầy đủ Vị trí, Nơi ở và Face ID.");
    return;
  }
  const { error } = await sb.rpc("hc_luu_ho_so", {
    p_msnv: saved.msnv, p_ten: saved.ten, p_vi_tri: viTri, p_noi_o: noiO, p_face_id: faceId
  });
  showMsg(document.getElementById("msgHoSo"), error ? "bad" : "ok", error ? "Có lỗi, vui lòng thử lại." : "✓ Đã lưu thông tin.");
});

document.getElementById("btnXuatExcel").addEventListener("click", async ()=>{
  const pass = prompt("Nhập mật khẩu để xuất báo cáo:");
  if(pass === null) return;
  const { data, error } = await sb.rpc("hc_xuat_ho_so", { p_pass: pass });
  const msgEl = document.getElementById("msgXuat");
  if(error){ showMsg(msgEl, "bad", "Sai mật khẩu hoặc có lỗi xảy ra."); return; }
  const rows = (data || []).map(r => ({
    "MSNV": r.msnv, "Họ tên": r.ten, "Chức vụ": r.chuc_vu || "",
    "Vị trí làm việc": (r.vi_tri||[]).join(", "),
    "Nơi ở": (r.noi_o||[]).join(", "),
    "Face ID": r.face_id || ""
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Vi tri - Noi o");
  XLSX.writeFile(wb, "hau_can_vi_tri_noi_o.xlsx");
  showMsg(msgEl, "ok", "✓ Đã xuất file Excel.");
});

init();
</script>
</body>
</html>
